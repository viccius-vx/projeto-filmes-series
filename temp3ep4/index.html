<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Casa de Papel - T3E4 (Dublado)</title>
    <style>
        body, html { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            background: #0b0b0f; 
            background-image: radial-gradient(circle at 50% 0%, #2b0b10 0%, #0b0b0f 70%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: sans-serif;
        }
        
        .player-wrapper {
            width: 80%;
            max-width: 900px;
            aspect-ratio: 16/9;
            background: #000;
            border-radius: 12px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            overflow: hidden;
            position: relative;
            border: 2px solid rgba(255,255,255,0.1);
        }

        @media (max-width: 768px) {
            .player-wrapper {
                width: 95%;
            }
        }

        iframe { 
            width: 100%; 
            height: 100%; 
            border: none; 
        }

        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 8px;
            font-size: 14px;
            z-index: 10;
            transition: 0.3s;
            border: 1px solid rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
        }
        .back-btn:hover { 
            background: #e50914; 
            border-color: #e50914;
        }
    </style>
</head>
<body>
    <a href="../index.html" class="back-btn">&larr; Voltar</a>
    
    <div class="player-wrapper">
        <iframe src="https://painel-aso.top/episodio/57649" allowfullscreen="true" webkitallowfullscreen="true" mozallowfullscreen="true"></iframe>
    </div>
</body>
</html>
